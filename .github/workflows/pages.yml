name: Deploy demo to GitHub Pages

# Builds the static, backend-less demo (VITE_DEMO=1) and publishes it to the
# gh-pages branch, so https://tpasson.github.io/sw-atlas/ always shows
# the current UI as an in-browser sandbox.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build:demo
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
