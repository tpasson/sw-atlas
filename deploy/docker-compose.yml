name: atlas

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
    volumes:
      - atlas-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ATLAS_DATABASE_URL: ${ATLAS_DATABASE_URL:-postgres://atlas:atlas@db:5432/atlas?sslmode=disable}
      ATLAS_SESSION_SECRET: ${ATLAS_SESSION_SECRET:?set ATLAS_SESSION_SECRET in deploy/.env}
      ATLAS_EDITOR_USERNAME: ${ATLAS_EDITOR_USERNAME:-editor}
      # The bcrypt hash is read from a file (Docker secret) so its '$' chars are
      # never touched by compose interpolation.
      ATLAS_EDITOR_PASSWORD_HASH_FILE: /run/secrets/editor_password_hash
    secrets:
      - editor_password_hash
    ports:
      - "${ATLAS_PORT:-8080}:8080"

secrets:
  editor_password_hash:
    file: ./editor_hash.txt

volumes:
  atlas-db:
